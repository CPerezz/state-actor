[toolchain]
# Nightly required because reth-codecs 0.3.1 MSRV (1.93) > Homebrew rustc 1.88.
# Use "nightly" (latest installed) rather than a pinned date; the roaring
# serialization format is stable so byte output is reproducible across nightly
# versions.  If regenerating on a machine without rustup, install nightly via:
#   rustup toolchain install nightly
channel = "nightly"
